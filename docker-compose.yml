version: "3.9"

services:
  todoflow-blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todoflow-blue
    environment:
      - DEPLOY_COLOR=blue
      - APP_ENV=development
      - APP_VERSION=1.0.0
      - BUILD_NUMBER=local
      - K8S_NAMESPACE=docker-compose
    ports:
      - "8000:8000"
    networks:
      - todoflow-net
    restart: unless-stopped

  todoflow-green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todoflow-green
    environment:
      - DEPLOY_COLOR=green
      - APP_ENV=development
      - APP_VERSION=1.0.0
      - BUILD_NUMBER=local
      - K8S_NAMESPACE=docker-compose
    ports:
      - "8001:8000"
    networks:
      - todoflow-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: todoflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - todoflow-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: todoflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana-provisioning/:/etc/grafana/provisioning/:ro
      - grafana-data:/var/lib/grafana
    networks:
      - todoflow-net
    restart: unless-stopped
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: todoflow-alertmanager
    ports:
      - "9093:9093"
    networks:
      - todoflow-net
    restart: unless-stopped

networks:
  todoflow-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
