global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: todoflow-blue
    static_configs:
      - targets: ['todoflow-blue:8000']
    metrics_path: /metrics

  - job_name: todoflow-green
    static_configs:
      - targets: ['todoflow-green:8000']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
