apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoflow-blue
  labels:
    app: todoflow
    deploy_color: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todoflow
      deploy_color: blue
  template:
    metadata:
      labels:
        app: todoflow
        deploy_color: blue
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: todoflow
          image: 588738615324.dkr.ecr.ap-south-1.amazonaws.com/todoflow:blue-latest
          ports:
            - containerPort: 8000
          env:
            - name: DEPLOY_COLOR
              value: "blue"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: todoflow-config
                  key: APP_VERSION
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: todoflow-config
                  key: APP_ENV
            - name: BUILD_NUMBER
              value: "blue-stable"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
